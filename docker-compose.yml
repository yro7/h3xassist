services:
  h3xassist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: h3xassist-bot
    ports:
      - "11411:11411"
    volumes:
      # Configuration and browser profiles (PERSISTENT - authenticated sessions)
      - h3xassist-config:/root/.config/h3xassist
      # Recordings and models (PERSISTENT - your data)
      - h3xassist-data:/root/.local/share/h3xassist
      # Audio socket from host PulseAudio/PipeWire (if available)
      - /run/pulse/native:/run/pulse/native
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      # PipeWire runtime
      - /run/pipewire:/run/pipewire:ro
      # X11 display for browser authentication
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      # Audio
      - PULSE_SERVER=unix:/run/user/0/pulse/native
      - XDG_RUNTIME_DIR=/run/user/0
      - DISPLAY=${DISPLAY:-:99}
      # Audio virtual device name for capture
      - H3XASSIST_AUDIO__VIRTUAL_DEVICE_NAME=h3xassist-monitor
      # Application settings
      - H3XASSIST_LOG=INFO
      - H3XASSIST_SUMMARIZATION__ENABLED=false
      - H3XASSIST_HTTP__HOST=0.0.0.0
      # Optional overrides:
      # - H3XASSIST_GENERAL__MEETING_DISPLAY_NAME=Teams Bot
      # - H3XASSIST_BROWSER__STABILITY_PROFILE=software_safe
    devices:
      # Direct audio device access (fallback)
      - /dev/snd:/dev/snd
    security_opt:
      - seccomp:unconfined  # Required for Chromium sandbox
    shm_size: '2gb'         # Required for Chromium shared memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  h3xassist-config:
    driver: local
    name: h3xassist-config
  h3xassist-data:
    driver: local
    name: h3xassist-data

networks:
  default:
    name: h3xassist-network
